<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Ruang Rapat - BLUD RSU Kota Banjar</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.initializeApp = initializeApp;
        window.getAuth = getAuth;
        window.signInAnonymously = signInAnonymously;
        window.signInWithCustomToken = signInWithCustomToken;
        window.onAuthStateChanged = onAuthStateChanged;
        window.getFirestore = getFirestore;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.query = query;
        window.getDocs = getDocs;
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f2937;
            color: #d1d5db;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2d3748; }
        ::-webkit-scrollbar-thumb { background: #718096; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0aec0; }
        .toast {
            visibility: hidden; min-width: 250px; margin-left: -125px;
            background-color: #333; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed;
            z-index: 1; left: 50%; bottom: 30px; opacity: 0;
            transition: visibility 0s, opacity 0.5s linear;
        }
        .toast.show { visibility: visible; opacity: 1; }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }
        .modal-content {
            background-color: #1f2937; color: #d1d5db;
            margin: 15% auto; padding: 20px; border: 1px solid #374151;
            width: 80%; max-width: 400px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .close-btn { color: #aaa; align-self: flex-end; font-size: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-gray-800 shadow-md">
        <div class="container mx-auto px-4 h-20 flex items-center space-x-4">
            <div class="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h4M8 7a2 2 0 012-2h4a2 2 0 012 2v8a2 2 0 01-2 2h-4a2 2 0 01-2-2V7z" />
                </svg>
            </div>
            <h1 class="text-xl sm:text-2xl font-bold text-white">Jadwal Ruang Rapat BLUD RSU Kota Banjar</h1>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 sm:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Input -->
            <div class="lg:col-span-1 bg-gray-900 p-6 rounded-xl shadow-lg text-white">
                <h2 class="text-2xl font-bold mb-6 border-b border-gray-600 pb-3">Daftar Jadwal Baru</h2>
                <form id="bookingForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nama / Penanggung Jawab</label>
                        <input type="text" id="organizer" name="organizer" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 focus:ring-blue-500" placeholder="Contoh: Bagian IT" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Agenda Rapat</label>
                        <input type="text" id="agenda" name="agenda" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 focus:ring-blue-500" placeholder="Contoh: Rapat Koordinasi" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Pilih Ruangan</label>
                        <select id="room" name="room" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 focus:ring-blue-500 text-white" required>
                            <option value="Ruang Rapat Aula Edelweiss">Ruang Rapat Aula Edelweiss</option>
                            <option value="Ruang Cempaka Zoom">Ruang Cempaka Zoom</option>
                            <option value="Ruang Rapat Komite Medik">Ruang Rapat Komite Medik</option>
                            <option value="Ruang Rapat Direktur">Ruang Rapat Direktur</option>
                            <option value="Ruang Rapat Casemix">Ruang Rapat Casemix</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Waktu Mulai</label>
                        <input type="datetime-local" id="startTime" name="startTime" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-600" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Waktu Selesai</label>
                        <input type="datetime-local" id="endTime" name="endTime" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-600" required>
                    </div>
                    <button type="submit" id="submitButton" class="w-full bg-blue-600 font-bold py-3 rounded-lg hover:bg-blue-700 transition" disabled>Memuat...</button>
                    <div id="loadingIndicator" class="hidden text-center py-3">
                        <span class="animate-spin inline-block h-5 w-5 border-2 border-white border-t-transparent rounded-full mr-2"></span> Menyimpan...
                    </div>
                </form>
            </div>

            <!-- Antrean Jadwal -->
            <div class="lg:col-span-2 bg-gray-900 p-6 rounded-xl shadow-lg text-white">
                <h2 class="text-2xl font-bold mb-6 border-b border-gray-600 pb-3">Antrean Pendaftar</h2>
                <div class="text-sm text-gray-400 mb-4" id="authStatus">Status Autentikasi: Memuat...</div>
                <div id="bookingQueue" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                    <p id="emptyMessage" class="text-gray-400 text-center py-10">Memuat jadwal...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <p>Apakah Anda yakin ingin menghapus jadwal ini?</p>
            <div class="flex justify-end gap-2 mt-4">
                <button id="cancelDeleteBtn" class="bg-gray-500 px-4 py-2 rounded-lg">Batal</button>
                <button id="confirmDeleteBtn" class="bg-red-600 px-4 py-2 rounded-lg">Hapus</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <footer class="bg-gray-800 text-white text-center py-4 mt-8">
        <p>&copy; Rsu-HTA.KotaBanjar2025</p>
    </footer>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyCxoUwVia0ntBjl-44sxdtqZY5uWeImfWo",
            authDomain: "jadwal-rapat-rsu.firebaseapp.com",
            projectId: "jadwal-rapat-rsu",
            storageBucket:"jadwal-rapat-rsu.firebasestorage.app",
            messagingSenderId: "346447954494",
            appId: "1:346447954494:web:cff3a04e7ff8f82620c76f",
            measurementId: "G-FRBS879SJH"
        };

        document.addEventListener('DOMContentLoaded', async function() {
            let db, auth, currentUserId = null, bookingsCollectionRef = null, unsubscribeSnapshot = null;
            const appId = 'rsu-banjar-booking';

            const elements = {
                form: document.getElementById('bookingForm'),
                queue: document.getElementById('bookingQueue'),
                empty: document.getElementById('emptyMessage'),
                toast: document.getElementById('toast'),
                modal: document.getElementById('deleteModal'),
                confirmBtn: document.getElementById('confirmDeleteBtn'),
                submitBtn: document.getElementById('submitButton'),
                loading: document.getElementById('loadingIndicator'),
                authStatus: document.getElementById('authStatus')
            };

            function showToast(msg, err = false) {
                elements.toast.textContent = msg;
                elements.toast.className = `toast show ${err ? 'bg-red-500' : 'bg-green-500'}`;
                setTimeout(() => elements.toast.className = "toast", 3000);
            }

            function formatDateTime(date) {
                return new Date(date).toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).replace(/\./g, ':');
            }

            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, async (user) => {
                if (!user) { await signInAnonymously(auth); return; }
                currentUserId = user.uid;
                elements.authStatus.textContent = 'Status: Terhubung';
                elements.submitBtn.disabled = false;
                elements.submitBtn.textContent = 'Daftarkan Jadwal';
                
               bookingsCollectionRef = collection(db, "meetings");
                
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                unsubscribeSnapshot = onSnapshot(bookingsCollectionRef, (snap) => {
                    const data = [];
                    snap.forEach(doc => data.push({id: doc.id, ...doc.data()}));
                    render(data);
                });
            });

            function render(bookings) {
                elements.queue.innerHTML = bookings.length ? '' : '<p class="text-center py-10">Belum ada jadwal.</p>';
                bookings.sort((a,b) => new Date(a.startTime) - new Date(b.startTime)).forEach(b => {
                    const item = document.createElement('div');
                    item.className = 'p-4 border border-gray-700 rounded-lg bg-gray-800 relative';
                    item.innerHTML = `
                        ${b.userId === currentUserId ? `<button onclick="window.delDoc('${b.id}')" class="absolute top-2 right-2 text-red-500">×</button>` : ''}
                        <h3 class="font-bold text-blue-400">${b.room}</h3>
                        <p class="font-semibold">${b.agenda}</p>
                        <p class="text-xs text-gray-500">Oleh: ${b.organizer}</p>
                        <div class="text-sm mt-2">
                            <span>${formatDateTime(b.startTime)} - ${formatDateTime(b.endTime)}</span>
                        </div>
                    `;
                    elements.queue.appendChild(item);
                });
            }

            window.delDoc = (id) => {
                elements.modal.style.display = 'block';
                elements.confirmBtn.onclick = async () => {
                    await deleteDoc(doc(db, "meetings", id));
                    elements.modal.style.display = 'none';
                    showToast("Jadwal dihapus");
                };
            };

            elements.form.onsubmit = async (e) => {
                e.preventDefault();
                elements.submitBtn.style.display = 'none';
                elements.loading.style.display = 'block';

                const data = {
                    organizer: e.target.organizer.value,
                    agenda: e.target.agenda.value,
                    room: e.target.room.value,
                    startTime: e.target.startTime.value,
                    endTime: e.target.endTime.value,
                    userId: currentUserId,
                    createdAt: new Date().toISOString()
                };

                try {
                    await addDoc(bookingsCollectionRef, data);
                    e.target.reset();
                    showToast("Berhasil didaftarkan!");
                } catch (err) { showToast("Gagal!", true); }
                
                elements.submitBtn.style.display = 'block';
                elements.loading.style.display = 'none';
            };

            document.querySelector('.close-btn').onclick = () => elements.modal.style.display = 'none';
            document.getElementById('cancelDeleteBtn').onclick = () => elements.modal.style.display = 'none';
        });
    </script>
</body>
</html>
